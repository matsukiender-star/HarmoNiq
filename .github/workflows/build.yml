name: Build HarmoNiq

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-22.04
    container:
      image: python:3.12
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y binutils libgl1 libxkbcommon-x11-0 libxcb-cursor0 libdbus-1-3 libnss3 libasound2t64 libxcomposite1 libxdamage1 libxrandr2 libxtst6 libxkbfile1 libxfixes3 libnspr4 libxcb-render-util0 libxcb-icccm4 libxcb-util1 libxcb-shape0 libxcb-keysyms1 libxcb-image0 file wget fuse3

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6 fastapi uvicorn shazamio mutagen aiohttp python-multipart websockets aiofiles static-ffmpeg jinja2 yt-dlp

      - name: Build with PyInstaller
        run: |
          pyinstaller HarmoNiq.spec --clean -y

      - name: Create AppImage
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/icons/hicolor/256x256/apps
          cp dist/HarmoNiq AppDir/usr/bin/HarmoNiq
          chmod +x AppDir/usr/bin/HarmoNiq
          cp app/static/images/harmoniq_icon.png AppDir/harmoniq.png || echo "No icon found, using placeholder"
          cp AppDir/harmoniq.png AppDir/.DirIcon 2>/dev/null || true
          cp AppDir/harmoniq.png AppDir/usr/share/icons/hicolor/256x256/apps/harmoniq.png 2>/dev/null || true
          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          exec "${HERE}/usr/bin/HarmoNiq" "$@"
          APPRUN
          chmod +x AppDir/AppRun
          cat > AppDir/harmoniq.desktop << 'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=HarmoNiq
          Exec=HarmoNiq
          Icon=harmoniq
          Categories=AudioVideo;Audio;Music;
          Comment=Download YouTube music with automatic Shazam tagging
          DESKTOP
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir dist/HarmoNiq-x86_64.AppImage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HarmoNiq-Linux
          path: dist/HarmoNiq-x86_64.AppImage

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6 fastapi uvicorn shazamio mutagen aiohttp python-multipart websockets aiofiles static-ffmpeg jinja2 yt-dlp

      - name: Build with PyInstaller
        run: |
          pyinstaller HarmoNiq.spec --clean -y

      - name: Rename artifact
        run: ren dist\HarmoNiq.exe HarmoNiq-Windows-x86_64.exe
        shell: cmd

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HarmoNiq-Windows
          path: dist/HarmoNiq-Windows-x86_64.exe

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: "HarmoNiq ${{ github.ref_name }}"
          body: |
            ## 🎵 HarmoNiq ${{ github.ref_name }}

            ### Descargas
            - 🐧 **Linux**: Descarga `HarmoNiq-x86_64.AppImage`, dale permisos con `chmod +x` y ejecútalo.
            - 🪟 **Windows**: Descarga `HarmoNiq-Windows-x86_64.exe` y ejecútalo directamente.
          files: |
            dist-artifacts/HarmoNiq-x86_64.AppImage
            dist-artifacts/HarmoNiq-Windows-x86_64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
