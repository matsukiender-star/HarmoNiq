name: Build HarmoNiq Releases

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install yt-dlp shazamio mutagen fastapi uvicorn static-ffmpeg aiofiles jinja2 python-multipart

      - name: Build Windows EXE
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --noconfirm --onedir --windowed --add-data "app;app/" --add-data "static;static/" --add-data "templates;templates/" --name "HarmoNiq" run.py
          Compress-Archive -Path dist\HarmoNiq -DestinationPath HarmoNiq-Windows.zip

      - name: Build Linux AppDir
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --noconfirm --onedir --windowed --add-data "app:app/" --add-data "static:static/" --add-data "templates:templates/" --name "HarmoNiq" run.py
          tar -czvf HarmoNiq-Linux.tar.gz -C dist HarmoNiq

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            HarmoNiq-Windows.zip
            HarmoNiq-Linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
