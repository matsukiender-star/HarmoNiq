name: Build HarmoNiq

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux AppImage
    # Sin `container:`. El AppImage se construye dentro de un contenedor
    # Ubuntu 22.04 que define packaging/Containerfile, para que el binario
    # quede enlazado contra glibc 2.35 y arranque tambien en Linux Mint 21/22.
    # La imagen python:3.12 que se usaba antes es Debian trixie (glibc 2.41):
    # el AppImage resultante no arrancaba en ninguna distro mas vieja.
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build AppImage
        run: |
          chmod +x packaging/build_appimage.sh packaging/check_compat.sh packaging/AppRun
          ENGINE=docker ./packaging/build_appimage.sh

      - name: Compatibility check
        run: ./packaging/check_compat.sh releases/HarmoNiq-x86_64.AppImage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HarmoNiq-Linux
          path: releases/HarmoNiq-x86_64.AppImage

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6 fastapi uvicorn shazamio mutagen aiohttp python-multipart websockets aiofiles static-ffmpeg jinja2 yt-dlp

      - name: Download ffmpeg (Windows)
        # ffmpeg/ffprobe se empaquetan en el bundle para que la app NO intente
        # descargarlos en runtime con static_ffmpeg. Esa descarga colgaba el
        # arranque en Windows (consumía CPU y el proceso moría sin ventana).
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # BtbN (GitHub) es la fuente principal por confiabilidad; gyan.dev de respaldo.
          $urls = @(
            "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip",
            "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          )
          $ok = $false
          foreach ($u in $urls) {
            for ($i = 1; $i -le 3; $i++) {
              try {
                Write-Host "Descargando ($i) $u"
                Invoke-WebRequest -Uri $u -OutFile ffmpeg.zip -TimeoutSec 180
                $ok = $true; break
              } catch { Write-Host "falló intento ${i}: $_"; Start-Sleep -Seconds 5 }
            }
            if ($ok) { break }
          }
          if (-not $ok) { throw "no se pudo descargar ffmpeg de ninguna fuente" }
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extract -Force
          New-Item -ItemType Directory -Force -Path vendor | Out-Null
          $ff = Get-ChildItem -Recurse ffmpeg_extract -Filter ffmpeg.exe | Select-Object -First 1
          $fp = Get-ChildItem -Recurse ffmpeg_extract -Filter ffprobe.exe | Select-Object -First 1
          Copy-Item $ff.FullName vendor\ffmpeg.exe
          Copy-Item $fp.FullName vendor\ffprobe.exe
          Write-Host "ffmpeg empaquetado:"; Get-ChildItem vendor

      - name: Build with PyInstaller
        run: pyinstaller HarmoNiq.spec --clean -y

      - name: Zip onedir bundle
        # onedir produce la carpeta dist/HarmoNiq/ (con HarmoNiq.exe dentro).
        # Se comprime a un .zip para distribuir un solo archivo.
        run: Compress-Archive -Path dist/HarmoNiq/* -DestinationPath HarmoNiq-Windows-x86_64.zip -Force
        shell: pwsh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HarmoNiq-Windows
          path: HarmoNiq-Windows-x86_64.zip

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: "HarmoNiq ${{ github.ref_name }}"
          body: |
            ## 🎵 HarmoNiq ${{ github.ref_name }}

            ### Descargas
            - 🐧 **Linux**: Descarga `HarmoNiq-x86_64.AppImage`, dale permisos con `chmod +x` y ejecútalo.
            - 🪟 **Windows**: Descarga `HarmoNiq-Windows-x86_64.zip`, descomprímelo y ejecuta `HarmoNiq.exe`.
          files: |
            dist-artifacts/HarmoNiq-x86_64.AppImage
            dist-artifacts/HarmoNiq-Windows-x86_64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
